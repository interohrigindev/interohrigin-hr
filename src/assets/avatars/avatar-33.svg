<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs><radialGradient id="b33" cx="50%" cy="40%" r="50%"><stop offset="0%" stop-color="#D1FAE5"/><stop offset="100%" stop-color="#6EE7B7"/></radialGradient></defs>
  <circle cx="40" cy="40" r="40" fill="url(#b33)"/>
  <!-- Great Wall of China -->
  <!-- Mountains in background -->
  <path d="M0 50l15-18 12 10 13-14 12 12 13-16 15 14v32H0z" fill="#86EFAC" opacity="0.5"/>
  <!-- Wall sections - going left to right, getting smaller for perspective -->
  <path d="M4 58l12-20h8l12 20" fill="#D4A06A"/>
  <path d="M28 38h8v20h-8z" fill="#E8CCA8"/>
  <!-- Tower/watchtower -->
  <rect x="26" y="32" width="12" height="8" fill="#D4A06A"/>
  <rect x="26" y="30" width="3" height="4" fill="#D4A06A"/>
  <rect x="30" y="30" width="3" height="4" fill="#D4A06A"/>
  <rect x="34" y="30" width="3" height="4" fill="#D4A06A"/>
  <!-- Continuing wall -->
  <path d="M36 38l14-14h8l10 18" fill="#E8CCA8"/>
  <!-- Another tower -->
  <rect x="48" y="20" width="10" height="8" fill="#D4A06A"/>
  <rect x="48" y="18" width="2.5" height="3" fill="#D4A06A"/>
  <rect x="51.5" y="18" width="2.5" height="3" fill="#D4A06A"/>
  <rect x="55" y="18" width="2.5" height="3" fill="#D4A06A"/>
  <!-- Steps on wall -->
  <path d="M16 50h4v-2h4v-2h4v-2" stroke="#C4854A" stroke-width="0.5" fill="none"/>
  <!-- Eyes -->
  <circle cx="35" cy="42" r="2.5" fill="white"/><circle cx="35.5" cy="42.5" r="1.5" fill="#1A1A1A"/><circle cx="36" cy="42" r="0.6" fill="white"/>
  <circle cx="45" cy="42" r="2.5" fill="white"/><circle cx="45.5" cy="42.5" r="1.5" fill="#1A1A1A"/><circle cx="46" cy="42" r="0.6" fill="white"/>
  <!-- Smile -->
  <path d="M38 47c1 1 3 1 4 0" stroke="#78350F" stroke-width="0.7" stroke-linecap="round" fill="none"/>
</svg>