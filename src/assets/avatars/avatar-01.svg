<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs><radialGradient id="b1" cx="50%" cy="40%" r="50%"><stop offset="0%" stop-color="#E5E7EB"/><stop offset="100%" stop-color="#9CA3AF"/></radialGradient></defs>
  <circle cx="40" cy="40" r="40" fill="url(#b1)"/>
  <!-- 쥐 (Rat) -->
  <ellipse cx="40" cy="44" rx="18" ry="16" fill="#D1D5DB"/>
  <!-- Big round ears -->
  <circle cx="20" cy="26" r="10" fill="#D1D5DB"/><circle cx="20" cy="26" r="6" fill="#F9A8D4"/>
  <circle cx="60" cy="26" r="10" fill="#D1D5DB"/><circle cx="60" cy="26" r="6" fill="#F9A8D4"/>
  <!-- Eyes -->
  <circle cx="33" cy="40" r="4" fill="white"/><circle cx="33.5" cy="40.5" r="2.5" fill="#1A1A1A"/><circle cx="34.5" cy="39.5" r="1" fill="white"/>
  <circle cx="47" cy="40" r="4" fill="white"/><circle cx="47.5" cy="40.5" r="2.5" fill="#1A1A1A"/><circle cx="48.5" cy="39.5" r="1" fill="white"/>
  <!-- Nose -->
  <ellipse cx="40" cy="48" rx="3" ry="2" fill="#F9A8D4"/>
  <!-- Whiskers -->
  <line x1="14" y1="44" x2="28" y2="46" stroke="#B0B0B0" stroke-width="0.7"/>
  <line x1="14" y1="48" x2="28" y2="48" stroke="#B0B0B0" stroke-width="0.7"/>
  <line x1="52" y1="46" x2="66" y2="44" stroke="#B0B0B0" stroke-width="0.7"/>
  <line x1="52" y1="48" x2="66" y2="48" stroke="#B0B0B0" stroke-width="0.7"/>
  <!-- Mouth -->
  <path d="M37 51c1.5 1 4.5 1 6 0" stroke="#999" stroke-width="0.8" stroke-linecap="round" fill="none"/>
  <!-- Teeth -->
  <rect x="38.5" y="51" width="1.5" height="2" rx="0.3" fill="white" stroke="#ccc" stroke-width="0.2"/>
  <rect x="40.5" y="51" width="1.5" height="2" rx="0.3" fill="white" stroke="#ccc" stroke-width="0.2"/>
  <circle cx="28" cy="48" r="3" fill="#F9A8D4" opacity="0.25"/>
  <circle cx="52" cy="48" r="3" fill="#F9A8D4" opacity="0.25"/>
