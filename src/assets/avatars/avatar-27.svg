<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs><radialGradient id="b27" cx="50%" cy="40%" r="50%"><stop offset="0%" stop-color="#FEF3C7"/><stop offset="100%" stop-color="#FCD34D"/></radialGradient></defs>
  <circle cx="40" cy="40" r="40" fill="url(#b27)"/>
  <!-- Big Ben (London) -->
  <!-- Tower body -->
  <rect x="30" y="20" width="20" height="48" rx="1" fill="#D4A06A"/>
  <rect x="32" y="22" width="16" height="44" fill="#E8CCA8"/>
  <!-- Clock face -->
  <circle cx="40" cy="34" r="8" fill="white" stroke="#D4A06A" stroke-width="1.5"/>
  <!-- Clock hands -->
  <line x1="40" y1="34" x2="40" y2="28" stroke="#1A1A1A" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="40" y1="34" x2="44" y2="34" stroke="#1A1A1A" stroke-width="1" stroke-linecap="round"/>
  <circle cx="40" cy="34" r="1" fill="#1A1A1A"/>
  <!-- Spire -->
  <path d="M36 20l4-12 4 12" fill="#D4A06A"/>
  <line x1="40" y1="8" x2="40" y2="4" stroke="#D4A06A" stroke-width="1.5"/>
  <!-- Windows -->
  <rect x="35" y="48" width="4" height="6" rx="1" fill="#93C5FD"/>
  <rect x="41" y="48" width="4" height="6" rx="1" fill="#93C5FD"/>
  <rect x="35" y="56" width="4" height="6" rx="1" fill="#93C5FD"/>
  <rect x="41" y="56" width="4" height="6" rx="1" fill="#93C5FD"/>
  <!-- Eyes (on clock face) -->
  <circle cx="37" cy="33" r="1.5" fill="#1A1A1A"/>
  <circle cx="43" cy="33" r="1.5" fill="#1A1A1A"/>
  <circle cx="37.5" cy="32.5" r="0.5" fill="white"/>
  <circle cx="43.5" cy="32.5" r="0.5" fill="white"/>
  <!-- Smile -->
  <path d="M38 37c1 1 3 1 4 0" stroke="#78350F" stroke-width="0.7" stroke-linecap="round" fill="none"/>
</svg>