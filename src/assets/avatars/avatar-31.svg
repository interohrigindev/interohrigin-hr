    <path d="M32 24c1-2 3-2 4 0" stroke="#D1D5DB" stroke-width="0.5" fill="none"/>
    <path d="M38 24c1-2 3-2 4 0" stroke="#D1D5DB" stroke-width="0.5" fill="none"/>
    <path d="M44 24c1-2 3-2 4 0" stroke="#D1D5DB" stroke-width="0.5" fill="none"/>
    <path d="M32 32c1-2 3-2 4 0" stroke="#D1D5DB" stroke-width="0.5" fill="none"/>
    <path d="M38 32c1-2 3-2 4 0" stroke="#D1D5DB" stroke-width="0.5" fill="none"/>
