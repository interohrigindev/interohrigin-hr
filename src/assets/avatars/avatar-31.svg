    <rect x="30" y="30" width="20" height="2" fill="#E5E7EB"/>
    <rect x="30" y="38" width="20" height="2" fill="#E5E7EB"/>
    <rect x="30" y="46" width="20" height="2" fill="#E5E7EB"/>
    <rect x="30" y="54" width="20" height="2" fill="#E5E7EB"/>
